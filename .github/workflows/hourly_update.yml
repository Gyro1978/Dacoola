name: Hourly News Update and Deploy

on:
  schedule:
    - cron: "0,20,40 * * * *"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}
      cancel-in-progress: true
    permissions:
      contents: write # Need write permissions to push changes

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history for accurate pulls/rebases

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt not found."
          fi

      - name: Test Critical Imports
        run: |
          echo "Attempting to import atprototools components..."
          python -c "from atprototools import Session, AtException; print('atprototools Session and AtException imported successfully')"
          echo "Attempting to import tweepy..."
          python -c "import tweepy; print('tweepy imported successfully')"
          # Add other critical import tests here if needed

      - name: Run Main Script (includes Sitemap Generation)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          YOUR_WEBSITE_NAME: ${{ secrets.YOUR_WEBSITE_NAME || vars.YOUR_WEBSITE_NAME || 'Dacoola' }}
          YOUR_WEBSITE_LOGO_URL: ${{ secrets.YOUR_WEBSITE_LOGO_URL || vars.YOUR_WEBSITE_LOGO_URL || '' }}
          YOUR_SITE_BASE_URL: ${{ secrets.YOUR_SITE_BASE_URL || vars.YOUR_SITE_BASE_URL || '' }}
          MAX_HOME_PAGE_ARTICLES: ${{ secrets.MAX_HOME_PAGE_ARTICLES || vars.MAX_HOME_PAGE_ARTICLES || 20 }}

          # Bluesky Credentials
          BLUESKY_HANDLE_1: ${{ secrets.BLUESKY_HANDLE_1 }}
          BLUESKY_APP_PASSWORD_1: ${{ secrets.BLUESKY_APP_PASSWORD_1 }}
          BLUESKY_HANDLE_2: ${{ secrets.BLUESKY_HANDLE_2 }}
          BLUESKY_APP_PASSWORD_2: ${{ secrets.BLUESKY_APP_PASSWORD_2 }}
          BLUESKY_HANDLE_3: ${{ secrets.BLUESKY_HANDLE_3 }}
          BLUESKY_APP_PASSWORD_3: ${{ secrets.BLUESKY_APP_PASSWORD_3 }}

          # Twitter Credentials
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}

          MAKE_INSTAGRAM_WEBHOOK_URL: ${{ secrets.MAKE_INSTAGRAM_WEBHOOK_URL }}

          # Google Ads API Credentials
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEV_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_CONFIGURATION_FILE_PATH: "google-ads.yaml" # Assuming it's at the root

          SEARCH_CONSOLE_API_KEY: ${{ secrets.SEARCH_CONSOLE_API_KEY }}
        run: python src/main.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add public/sitemap.xml || echo "Sitemap not found or no changes."
          git add public/ # Includes articles/, all_articles.json, and potentially sitemap.xml
          git add dacola.log || echo "Log file not found or no changes."
          git add data/processed_article_ids.txt || echo "Processed IDs file not found or no changes."
          git add data/twitter_daily_limit.json || echo "Twitter limit file not found or no changes."

          if git diff --staged --quiet; then
            echo "No content changes detected to commit."
          else
            echo "Content changes detected. Committing..."
            git commit -m "Automated news update and sitemap generation [skip ci]" 

            echo "Stashing any potentially unstaged changes..."
            git stash push --include-untracked 

            echo "Pulling latest changes before push (rebase strategy)..."
            git pull origin ${{ github.ref_name }} --rebase || { echo "::error::git pull --rebase failed"; exit 1; }

            echo "Attempting to push changes..."
            retry_count=0; max_retries=3; delay=5;
            until git push origin ${{ github.ref_name }} || [ $retry_count -ge $max_retries ]; do
              retry_count=$((retry_count+1))
              echo "Push failed. Retrying (${retry_count}/${max_retries})..."
              sleep $delay
            done

            if [ $retry_count -ge $max_retries ]; then
              echo "::error::Push failed after $max_retries attempts."
              exit 1
            fi
            echo "Changes pushed successfully."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Netlify CLI
        run: |
          if git diff --quiet HEAD^ HEAD -- .; then # Check if the build commit actually made changes
            echo "No changes were committed in the previous step by this workflow. Skipping Netlify deploy."
            # Check if the latest commit is by the bot AND if there are no other changes to prevent deploy loops
            LATEST_COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an')
            if [[ "$LATEST_COMMIT_AUTHOR" == "GitHub Actions Bot" ]]; then
                # If only bot commit and no other diffs, it implies content hasn't changed from a user's perspective
                # This logic might need refinement based on how you determine "no real changes"
                # For now, a simple check: if HEAD^ is the same as HEAD before this bot commit, maybe skip.
                # This is tricky, a safer bet is to check if the commit step made changes.
                # Using the output of the commit step would be more robust if possible.
                 echo "Last commit was by bot, and no diff to previous state before bot commit. Skipping."
                # exit 0 # This exit 0 might be too aggressive.
            fi
            # Fallback if not bot commit, still check for overall diff
            # if git diff --quiet origin/${{ github.ref_name }} HEAD -- public/; then
            #    echo "No significant changes to public directory compared to origin. Skipping."
            #    exit 0
            # fi
            # This is simpler: if the commit step didn't run (no changes staged), this step won't run if we use an if condition.
            # The current logic relies on the commit step itself detecting "No content changes".
            # If the commit step says "No content changes detected", the `git diff --quiet HEAD^ HEAD -- .` check later might be redundant
            # or this step might not be reached correctly if the commit step doesn't make a commit.
            # The provided Install Netlify CLI logic already checks `git diff --quiet HEAD^ HEAD -- .`
            # This means if the 'Commit and Push Changes' step *did not* make a commit, this will skip.
            # If it *did* make a commit, it will proceed. This seems correct.
            echo "No changes were committed in the previous step. Skipping Netlify deploy."
            exit 0
          else
            echo "Changes were committed. Proceeding with Netlify deployment."
            npm install -g netlify-cli
          fi

      - name: Deploy to Netlify
        run: netlify deploy --dir=public --prod --auth $NETLIFY_AUTH_TOKEN --site $NETLIFY_SITE_ID
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
